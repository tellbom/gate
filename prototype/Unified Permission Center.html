<style>
/* ============================================================
   统一权限中心 — Apple-language design tokens
   ============================================================ */
:root {
  /* Accent (single brand interactive color) */
  --blue: #0066cc;
  --blue-focus: #0071e3;
  --blue-on-dark: #2997ff;
  --blue-wash: #eaf2fb;
  --blue-wash-strong: #dbeafd;

  /* Ink / text */
  --ink: #1d1d1f;
  --ink-80: #333333;
  --ink-60: #5c5c60;
  --ink-48: #7a7a7a;

  /* Surfaces */
  --canvas: #ffffff;
  --parchment: #f5f5f7;
  --pearl: #fafafc;
  --tile-dark: #272729;
  --tile-dark-2: #2a2a2c;

  /* Lines */
  --hairline: #e0e0e0;
  --divider: #f0f0f0;

  /* Functional status tones (kept low-chroma, never compete with blue) */
  --ok: #1a7f47;
  --ok-wash: #e7f3ec;
  --warn: #9a6a00;
  --warn-wash: #f6efdc;
  --deny: #b3261e;
  --deny-wash: #fbeae9;
  --super: #6b4ea8;
  --super-wash: #efeaf7;

  /* Radii */
  --r-xs: 5px;
  --r-sm: 8px;
  --r-md: 11px;
  --r-lg: 18px;
  --r-pill: 9999px;

  /* Spacing scale */
  --s-xxs: 4px;
  --s-xs: 8px;
  --s-sm: 12px;
  --s-md: 17px;
  --s-lg: 24px;
  --s-xl: 32px;
  --s-xxl: 48px;

  /* Fonts */
  --font-display: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", system-ui, "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-text: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, "PingFang SC", "Microsoft YaHei", sans-serif;

  /* The one allowed elevation — only on floating chrome (drawers, modals, sticky) */
  --float-shadow: 0 20px 60px rgba(0,0,0,0.16), 0 4px 12px rgba(0,0,0,0.06);
  --rest-shadow: 0 1px 2px rgba(0,0,0,0.04);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-text);
  color: var(--ink);
  background: var(--parchment);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-size: 15px;
  line-height: 1.47;
  letter-spacing: -0.01em;
}
#root { height: 100vh; overflow: hidden; }

/* Typography helpers */
.t-hero { font-family: var(--font-display); font-size: 44px; font-weight: 600; line-height: 1.07; letter-spacing: -0.02em; }
.t-display { font-family: var(--font-display); font-size: 32px; font-weight: 600; line-height: 1.1; letter-spacing: -0.018em; }
.t-title { font-family: var(--font-display); font-size: 24px; font-weight: 600; line-height: 1.16; letter-spacing: -0.015em; }
.t-section { font-family: var(--font-display); font-size: 19px; font-weight: 600; line-height: 1.25; letter-spacing: -0.01em; }
.t-lead { font-family: var(--font-display); font-size: 21px; font-weight: 400; line-height: 1.3; letter-spacing: -0.005em; color: var(--ink-60); }
.t-body { font-size: 15px; font-weight: 400; line-height: 1.5; }
.t-body-strong { font-size: 15px; font-weight: 600; letter-spacing: -0.012em; }
.t-cap { font-size: 13px; font-weight: 400; color: var(--ink-48); letter-spacing: -0.006em; }
.t-cap-strong { font-size: 13px; font-weight: 600; color: var(--ink-60); letter-spacing: -0.006em; }
.t-micro { font-size: 11px; font-weight: 500; letter-spacing: 0.02em; }
.t-mono { font-family: "SF Mono", ui-monospace, "JetBrains Mono", "Menlo", monospace; font-size: 12.5px; letter-spacing: -0.01em; }

.muted { color: var(--ink-48); }
.muted-60 { color: var(--ink-60); }

/* Scrollbars — quiet */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 9999px; border: 3px solid transparent; background-clip: content-box; }
::-webkit-scrollbar-thumb:hover { background: #bdbdc2; background-clip: content-box; }
::-webkit-scrollbar-track { background: transparent; }

/* Focus ring */
button:focus-visible, a:focus-visible, input:focus-visible, [tabindex]:focus-visible {
  outline: 2px solid var(--blue-focus);
  outline-offset: 2px;
}

/* Buttons */
.btn { font-family: var(--font-text); font-size: 14px; font-weight: 400; letter-spacing: -0.01em; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 7px; transition: transform .08s ease, background .15s ease, opacity .15s ease; white-space: nowrap; }
.btn:active { transform: scale(0.96); }
.btn[disabled] { opacity: .4; cursor: not-allowed; }
.btn-primary { background: var(--blue); color: #fff; border-radius: var(--r-pill); padding: 9px 20px; }
.btn-primary:hover { background: #0a6ed6; }
.btn-ghost { background: transparent; color: var(--blue); border: 1px solid var(--blue); border-radius: var(--r-pill); padding: 8px 19px; }
.btn-ghost:hover { background: var(--blue-wash); }
.btn-neutral { background: var(--canvas); color: var(--ink); border: 1px solid var(--hairline); border-radius: var(--r-pill); padding: 8px 18px; }
.btn-neutral:hover { background: var(--pearl); border-color: #cfcfd4; }
.btn-dark { background: var(--ink); color: #fff; border-radius: var(--r-sm); padding: 7px 15px; font-size: 13px; }
.btn-danger { background: transparent; color: var(--deny); border: 1px solid #e4b6b3; border-radius: var(--r-pill); padding: 8px 18px; }
.btn-danger:hover { background: var(--deny-wash); }
.btn-sm { padding: 6px 14px; font-size: 13px; }
.btn-text { background: transparent; color: var(--blue); padding: 4px 6px; border-radius: var(--r-xs); }
.btn-text:hover { background: var(--blue-wash); }

/* Card */
.card { background: var(--canvas); border: 1px solid var(--hairline); border-radius: var(--r-lg); }

/* Hairline utility */
.hr { height: 1px; background: var(--hairline); border: none; margin: 0; }

/* Fade/slide animations */
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
@keyframes scaleIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
@keyframes slideInRight { from { transform: translateX(100%); } to { transform: none; } }
@keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
.anim-fade { animation: fadeUp .4s cubic-bezier(.2,.7,.2,1) both; }

input, select, textarea { font-family: var(--font-text); }

</style>

<script>

(function () {

  // ---- /api/global/group/list -> list items ----
  // fields: groupCode, groupName, project, parent_group_code, status, permissionCodes
  const GROUPS = [
    { groupCode: "portal_admin",   groupName: "门户管理员",   project: "portal",   parent_group_code: null,           status: "Active",   members: 12, permissionCodes: ["menu:portal.home","menu:portal.layout","button:portal.publish","menu:portal.user","button:portal.user.edit"] },
    { groupCode: "portal_editor",  groupName: "门户编辑",     project: "portal",   parent_group_code: "portal_admin", status: "Active",   members: 34, permissionCodes: ["menu:portal.home","button:portal.publish"] },
    { groupCode: "workflow_admin", groupName: "流程管理员",   project: "workflow", parent_group_code: null,           status: "Active",   members: 9,  permissionCodes: ["menu:workflow.design","menu:workflow.instance","button:workflow.deploy","menu:workflow.form"] },

    const projectCodes = Object.keys(grants).filter(k => k !== "__global__");
    const groupCodes = [], groupNames = [], superProjects = [];

        groupCodes.push(gc);

      });
      if (grants[pc].super) superProjects.push(pc);
    });
    return { userid, username, status, projectCodes, groupCodes, groupNames, superProjects,

  }

  const USERS = [
    mkUser("EMP001", "张三", "Active", { __global__: { super: true }, portal: { groups:["portal_admin"], super:true }, rbac: { groups:["rbac_admin"], super:true }, workflow: { groups:["workflow_admin"] } }),

    mkUser("EMP004", "赵六", "Disabled", { quality: { groups:["quality_admin"] } }),
    mkUser("EMP005", "钱七", "Active", { portal: { groups:["portal_editor"] }, news: { groups:["news_reviewer"] } }),
    mkUser("EMP006", "孙八", "Active", { quality: { groups:["quality_admin"], super:true }, rbac: { groups:["rbac_auditor"] } }),
    mkUser("EMP007", "周九", "Active", { workflow: { groups:["workflow_ops"] } }),
    mkUser("EMP008", "吴十", "Active", { portal: { groups:["portal_editor"] }, message: { groups:["operator"] }, quality: { groups:["quality_viewer"] } }),
    mkUser("EMP009", "郑十一", "Disabled", { news: { groups:["news_admin"] } }),
    mkUser("EMP010", "王十二", "Active", { rbac: { groups:["rbac_admin"], super:true } }),
    mkUser("EMP011", "冯十三", "Active", { message: { groups:["operator"] } }),
    mkUser("EMP012", "陈十四", "Active", { portal: { groups:["portal_admin"], super:true }, quality: { groups:["quality_viewer"] } }),
    mkUser("EMP013", "褚十五", "Active", { workflow: { groups:["workflow_ops"] }, news: { groups:["news_reviewer"] } }),
    mkUser("EMP014", "卫十六", "Active", { quality: { groups:["quality_admin"] } }),

  // ---- /api/global/menu/list & /api/rule/tree ----
  // node fields: ruleCode, permissionCode, title, type, status, icon, weigh, menuType, path, children
  const RULE_TREE = {
    portal: [
      { ruleCode:"portal.home", permissionCode:"menu:portal.home", title:"门户首页", type:"Menu", status:"Active", icon:"home", weigh:90, path:"/portal/home", children:[

      ]},
      { ruleCode:"portal.layout", permissionCode:"menu:portal.layout", title:"版面管理", type:"Menu", status:"Active", icon:"layout", weigh:80, path:"/portal/layout", children:[] },
      { ruleCode:"portal.user", permissionCode:"menu:portal.user", title:"门户用户", type:"Menu", status:"Active", icon:"user", weigh:70, path:"/portal/user", children:[
        { ruleCode:"portal.user.edit", permissionCode:"button:portal.user.edit", title:"编辑用户", type:"Button", status:"Active", weigh:10 },
      ]},
    ],
    workflow: [
      { ruleCode:"workflow", permissionCode:"menu:workflow", title:"流程管理", type:"MenuDir", status:"Active", icon:"folder", weigh:100, children:[

        ]},

      ]},

      { ruleCode:"system", permissionCode:"menu:system", title:"系统管理", type:"MenuDir", status:"Active", icon:"cog", weigh:100, children:[

        { ruleCode:"system.group", permissionCode:"menu:system.group", title:"权限组", type:"Menu", status:"Active", icon:"group", weigh:80, path:"/system/group", children:[] },
        { ruleCode:"system.rule", permissionCode:"menu:system.rule", title:"菜单规则", type:"Menu", status:"Active", icon:"menu", weigh:70, path:"/system/rule", children:[] },

      { ruleCode:"search", permissionCode:"menu:search", title:"查询中心", type:"MenuDir", status:"Active", icon:"search", weigh:90, children:[
        { ruleCode:"search.audit", permissionCode:"menu:search.audit", title:"审计日志", type:"Menu", status:"Active", icon:"shield", weigh:90, path:"/search/audit", children:[] },

  // ---- /api/search/audit-logs -> list items ----

  const AUDIT = [];

  for (let i = 0; i < 32; i++) {
    const u = USERS[i % USERS.length];
    const r = ROUTES[i % ROUTES.length];
    const result = RESULTS[i % RESULTS.length];
    const proj = u.projectCodes[0] || "rbac";
    AUDIT.push({

  // ---- /api/api-map/records -> list items ----
  const API_MAP = [

function Icon({ name, size = 18, stroke = 1.7, className = "", style = {}, fill = false }) {

/* ---------- Project glyph (initial tile) ---------- */
const PROJ_TINT = {
  portal:  ["#e9f0fb", "#0066cc"],
  workflow:["#eef0f4", "#3a3a3c"],
  message: ["#eaf3ee", "#1a7f47"],
  news:    ["#f6efdc", "#9a6a00"],
  quality: ["#efeaf7", "#6b4ea8"],
  rbac:    ["#fbeae9", "#b3261e"],
};
function ProjectGlyph({ code, name, size = 36, radius = 9 }) {
  const [bg, fg] = PROJ_TINT[code] || ["#eee", "#555"];
  const letter = (name || code || "?").trim()[0].toUpperCase();
  return (
    <div style={{ width: size, height: size, borderRadius: radius, background: bg, color: fg,
      display: "flex", alignItems: "center", justifyContent: "center",
      fontFamily: "var(--font-display)", fontWeight: 600, fontSize: size * 0.42, flexShrink: 0,
      letterSpacing: "-0.02em" }}>{letter}</div>
  );
}

/* ---------- Avatar ---------- */
function Avatar({ name, size = 32, dim = false }) {
  const letter = (name || "?").trim()[0];
  const hue = ((name || "").charCodeAt(0) * 47) % 360;
  return (
    <div style={{ width: size, height: size, borderRadius: "50%", flexShrink: 0,
      background: dim ? "#ededf0" : `oklch(0.92 0.04 ${hue})`,
      color: dim ? "#9a9aa0" : `oklch(0.42 0.09 ${hue})`,
      display: "flex", alignItems: "center", justifyContent: "center",
      fontWeight: 600, fontSize: size * 0.42, fontFamily: "var(--font-display)" }}>{letter}</div>
  );
}

/* ---------- Status badge ---------- */
function Badge({ tone = "neutral", children, dot = false, soft = true, size = "md" }) {
  const tones = {
    ok:     ["var(--ok)", "var(--ok-wash)"],
    warn:   ["var(--warn)", "var(--warn-wash)"],
    deny:   ["var(--deny)", "var(--deny-wash)"],
    blue:   ["var(--blue)", "var(--blue-wash)"],
    super:  ["var(--super)", "var(--super-wash)"],
    neutral:["var(--ink-60)", "#f0f0f2"],
  };
  const [fg, bg] = tones[tone] || tones.neutral;
  const pad = size === "sm" ? "2px 8px" : "3px 10px";
  const fs = size === "sm" ? 11 : 12;
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: pad,
      borderRadius: 9999, background: soft ? bg : "transparent", color: fg,
      fontSize: fs, fontWeight: 600, letterSpacing: "-0.01em", whiteSpace: "nowrap", lineHeight: 1.3 }}>
      {dot && <span style={{ width: 6, height: 6, borderRadius: "50%", background: fg }} />}
      {children}
    </span>
  );
}

/* ---------- Segmented control ---------- */
function Segmented({ options, value, onChange, size = "md" }) {
  const pad = size === "sm" ? "5px 12px" : "7px 16px";
  const fs = size === "sm" ? 13 : 14;
  return (
    <div style={{ display: "inline-flex", background: "#ececef", borderRadius: 10, padding: 3, gap: 2 }}>
      {options.map(opt => {
        const val = typeof opt === "string" ? opt : opt.value;
        const label = typeof opt === "string" ? opt : opt.label;
        const active = val === value;
        return (
          <button key={val} className="btn" onClick={() => onChange(val)}
            style={{ padding: pad, fontSize: fs, borderRadius: 8, fontWeight: active ? 600 : 400,
              background: active ? "#fff" : "transparent", color: active ? "var(--ink)" : "var(--ink-60)",
              boxShadow: active ? "0 1px 3px rgba(0,0,0,0.12)" : "none", transition: "all .15s ease" }}>
            {label}

}

/* ---------- Toggle switch ---------- */
function Toggle({ on, onChange, disabled, tone = "blue" }) {
  const col = tone === "super" ? "var(--super)" : "var(--blue)";
  return (
    <button className="btn" disabled={disabled} onClick={() => !disabled && onChange(!on)}
      style={{ width: 42, height: 25, borderRadius: 9999, padding: 0, position: "relative",
        background: on ? col : "#d4d4d8", transition: "background .2s ease", flexShrink: 0,

        boxShadow: "0 1px 2px rgba(0,0,0,0.3)" }} />

}

/* ---------- Checkbox ---------- */
function Check({ on, onChange, disabled }) {

    <button className="btn" disabled={disabled} onClick={() => !disabled && onChange(!on)}

/* ---------- Search input ---------- */
function SearchInput({ value, onChange, placeholder = "搜索", width = 260 }) {
  return (
    <div style={{ position: "relative", width }}>

        <Icon name="search" size={15} />
      </span>
      <input value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
        style={{ width: "100%", height: 38, borderRadius: 9999, border: "1px solid var(--hairline)",
          background: "#fff", padding: "0 16px 0 36px", fontSize: 14, color: "var(--ink)", outline: "none" }} />
    </div>
  );
}

/* ---------- Plain field input ---------- */
function Field({ label, value, onChange, placeholder, hint, mono, as = "input", children }) {
  return (
    <label style={{ display: "block" }}>
      {label && <div className="t-cap-strong" style={{ marginBottom: 7 }}>{label}</div>}
      {as === "select" ? (
        <select value={value} onChange={e => onChange(e.target.value)}
          style={{ width: "100%", height: 40, borderRadius: 10, border: "1px solid var(--hairline)",
            background: "#fff", padding: "0 12px", fontSize: 14, color: "var(--ink)", outline: "none" }}>
          {children}
        </select>
      ) : (
        <input value={value} onChange={e => onChange && onChange(e.target.value)} placeholder={placeholder}
          style={{ width: "100%", height: 40, borderRadius: 10, border: "1px solid var(--hairline)",
            background: "#fff", padding: "0 13px", fontSize: 14, color: "var(--ink)", outline: "none",
            fontFamily: mono ? "var(--font-text)" : "inherit" }} />
      )}
      {hint && <div className="t-cap" style={{ marginTop: 6 }}>{hint}</div>}
    </label>
  );
}

/* ---------- API endpoint tag ---------- */
const METHOD_TONE = { GET:"#1a7f47", POST:"#0066cc", PUT:"#9a6a00", DELETE:"#b3261e", PATCH:"#6b4ea8" };
function ApiTag({ method, path, mini = false }) {
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 7, background: "#f6f6f8",
      border: "1px solid var(--divider)", borderRadius: 7, padding: mini ? "2px 8px 2px 6px" : "4px 10px 4px 7px",
      fontFamily: "var(--font-text)", maxWidth: "100%" }}>
      <span style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: "0.03em", color: METHOD_TONE[method] || "#555",
        fontFamily: "SF Mono, ui-monospace, monospace" }}>{method}</span>
      <span className="t-mono" style={{ color: "var(--ink-80)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", fontSize: mini ? 11.5 : 12.5 }}>{path}</span>
    </span>
  );
}

/* ---------- "Powered by" API source strip (page-level) ---------- */
function ApiSource({ endpoints, note }) {
  const [open, setOpen] = useState(false);
  return (
    <div style={{ background: "var(--blue-wash)", border: "1px solid var(--blue-wash-strong)",
      borderRadius: 12, padding: "11px 14px" }}>
      <button className="btn" onClick={() => setOpen(o => !o)}
        style={{ width: "100%", justifyContent: "space-between", padding: 0, background: "transparent" }}>
        <span style={{ display: "inline-flex", alignItems: "center", gap: 8, color: "var(--blue)" }}>
          <Icon name="link" size={15} />
          <span className="t-cap-strong" style={{ color: "var(--blue)" }}>本页数据来源 · {endpoints.length} 个接口</span>
        </span>
        <Icon name="chevD" size={16} style={{ color: "var(--blue)", transform: open ? "rotate(180deg)" : "none", transition: "transform .2s" }} />
      </button>
      {open && (
        <div className="anim-fade" style={{ marginTop: 11, display: "flex", flexDirection: "column", gap: 7 }}>
          {endpoints.map((e, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
              <ApiTag method={e.m} path={e.p} />
              <span className="t-cap">{e.d}</span>
            </div>
          ))}
          {note && <div className="t-cap" style={{ marginTop: 4, color: "var(--ink-60)" }}>{note}</div>}
        </div>
      )}
    </div>
  );
}

/* ---------- Drawer (slide-over) ---------- */
function Drawer({ open, onClose, children, width = 460 }) {
  useEffect(() => {
    const h = (e) => e.key === "Escape" && onClose();
    if (open) window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [open, onClose]);
  if (!open) return null;
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 60 }}>
      <div onClick={onClose} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.28)", animation: "overlayIn .2s ease both" }} />
      <div style={{ position: "absolute", top: 0, right: 0, bottom: 0, width, maxWidth: "94vw",
        background: "var(--canvas)", boxShadow: "var(--float-shadow)", animation: "slideInRight .32s cubic-bezier(.2,.7,.2,1) both",
        display: "flex", flexDirection: "column" }}>
        {children}
      </div>
    </div>
  );
}

/* ---------- Modal ---------- */
function Modal({ open, onClose, children, width = 480 }) {
  useEffect(() => {
    const h = (e) => e.key === "Escape" && onClose && onClose();
    if (open) window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [open, onClose]);
  if (!open) return null;
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 70, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div onClick={onClose} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.32)", animation: "overlayIn .2s ease both" }} />
      <div style={{ position: "relative", width, maxWidth: "100%", maxHeight: "90vh", overfl:"hidden",
        background: "var(--canvas)", borderRadius: 20, boxShadow: "var(--float-shadow)",
        animation: "scaleIn .26s cubic-bezier(.2,.7,.2,1) both", display: "flex", flexDirection: "column" }}>
        {children}
      </div>
    </div>
  );
}

/* ---------- Toast ---------- */
function useToast() {
  const [toasts, setToasts] = useState([]);
  const push = (msg, tone = "ok") => {
    const id = Math.random().toString(36).slice(2);
    setToasts(t => [...t, { id, msg, tone }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3200);
  };
  const node = (
    <div style={{ position: "fixed", bottom: 26, left: "50%", transform: "translateX(-50%)", zIndex: 90,
      display: "flex", flexDirection: "column", gap: 8, alignItems: "center" }}>
      {toasts.map(t => (
        <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 10, background: "var(--ink)",
          color: "#fff", padding: "11px 18px", borderRadius: 12, boxShadow: "var(--float-shadow)",
          animation: "fadeUp .3s ease both", fontSize: 14, fontWeight: 500 }}>
          <span style={{ color: t.tone === "ok" ? "#5fd08a" : t.tone === "deny" ? "#ff8a82" : "#ffd27a", display: "flex" }}>
            <Icon name={t.tone === "deny" ? "x" : "check"} size={16} stroke={2.4} />
          </span>
          {t.msg}
        </div>
      ))}
    </div>
  );
  return { push, node };
}

/* ---------- Stat number formatting ---------- */
function fmt(n) { return n.toLocaleString("en-US"); }
function timeAgo(iso) {
  const diff = (new Date("2026-06-14T11:20:00+08:00") - new Date(iso)) / 60000;
  if (diff < 1) return "刚刚";
  if (diff < 60) return Math.floor(diff) + " 分钟前";
  if (diff < 1440) return Math.floor(diff / 60) + " 小时前";
  return Math.floor(diff / 1440) + " 天前";
}
function fmtTime(iso) {
  const d = new Date(iso);
  const p = (x) => String(x).padStart(2, "0");
  return `${d.getMonth()+1}月${d.getDate()}日 ${p(d.getHours())}:${p(d.getMinutes())}`;
}

Object.assign(window, {
  Icon, ProjectGlyph, Avatar, Badge, Segmented, Toggle, Check, SearchInput, Field,
  ApiTag, ApiSource, Drawer, Modal, useToast, fmt, timeAgo, fmtTime, PROJ_TINT, METHOD_TONE,
});

</script>

          <div key={k} style={{ display: "flex", justifyContent: "space-between", gap: 16 }}>
            <span className="t-cap-strong">{k}</span>
            <span className="t-body" style={{ fontSize: 13.5, textAlign: "right", fontWeight: 500 }}>{v}</span>
          </div>
        ))}
      </div>
      <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
        <button className="btn btn-neutral" onClick={onCancel}>取消</button>
        <button className="btn" onClick={onConfirm} style={{ background: val ? "var(--super)" : "var(--warn)", color: "#fff", borderRadius: 9999, padding: "9px 20px" }}>
          {val ? "确认提升" : "确认降级"}
        </button>
      </div>
    </div>
  );
}

function UsersPage({ ctx, setAction }) {
  const { store, go, setIntent } = ctx;
  const [kw, setKw] = useSU("");
  const [proj, setProj] = useSU("all");
  const [status, setStatus] = useSU("all");
  const [sel, setSel] = useSU(null);

  useEffU(() => {
    setAction(<button className="btn btn-primary" onClick={() => { setIntent({ type: "grant" }); go("authorization"); }}><Icon name="plus" size={16} /> 授权用户</button>);
    return () => setAction(null);
  }, [store]);

  const rows = store.users.filter(u => {
    if (proj !== "all" && !u.projectCodes.includes(proj)) return false;
    if (status !== "all" && u.status !== (status === "active" ? "Active" : "Disabled")) return false;
    if (kw && !(u.username.includes(kw) || u.userid.toLowerCase().includes(kw.toLowerCase()))) return false;
    return true;
  });

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 18, flexWrap: "wrap" }}>
        <SearchInput value={kw} onChange={setKw} placeholder="搜索姓名或 userid" width={240} />
        <Segmented size="sm" value={status} onChange={setStatus} options={[{value:"all",label:"全部"},{value:"active",label:"启用"},{value:"disabled",label:"禁用"}]} />
        <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 8 }}>
          <Icon name="filter" size={15} style={{ color: "var(--ink-48)" }} />
          <select value={proj} onChange={e => setProj(e.target.value)}
            style={{ height: 34, borderRadius: 9999, border: "1px solid var(--hairline)", background: "#fff", padding: "0 14px", fontSize: 13.5, color: "var(--ink)" }}>
            <option value="all">全部系统</option>
            {store.projects.map(p => <option key={p.code} value={p.code}>{p.name}</option>)}
          </select>
        </div>
      </div>

      <div className="card" style={{ padding: 0, overflow: "hidden" }}>
        <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 2.4fr 1.4fr 1fr 80px", padding: "12px 22px", borderBottom: "1px solid var(--hairline)", background: "var(--pearl)" }}>
          {["用户", "状态", "所属系统", "权限组", "超管", ""].map((h, i) => <span key={i} className="t-cap-strong" style={{ fontSize: 12 }}>{h}</span>)}
        </div>
        {rows.map((u, i) => (
          <div key={u.userid} onClick={() => setSel(u)}
            style={{ display: "grid", gridTemplateColumns: "2fr 1fr 2.4fr 1.4fr 1fr 80px", padding: "13px 22px", alignItems: "center",
              borderTop: i ? "1px solid var(--divider)" : "none", cursor: "pointer", transition: "background .12s" }}
            onMouseEnter={e => e.currentTarget.style.background = "var(--pearl)"}
            onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
            <div style={{ display: "flex", alignItems: "center", gap: 11 }}>
              <Avatar name={u.username} size={34} dim={u.status === "Disabled"} />
              <div>
                <div className="t-body-strong" style={{ fontSize: 14 }}>{u.username}</div>
                <div className="t-cap"><span className="t-mono" style={{ fontSize: 11.5 }}>{u.userid}</span></div>
              </div>
            </div>
            <div><Badge tone={u.status === "Active" ? "ok" : "neutral"} dot size="sm">{u.status === "Active" ? "启用" : "禁用"}</Badge></div>
            <div><ProjectChips codes={u.projectCodes} projects={store.projects} /></div>
            <div className="t-body" style={{ fontSize: 13.5 }}>{u.groupCodes.length > 0 ? `${u.groupCodes.length} 个组` : <span className="muted">—</span>}</div>
            <div>{u.superProjects.length > 0 ? <Badge tone="super" size="sm" dot>{u.superProjects.length}</Badge> : <span className="muted t-cap">—</span>}</div>
            <div style={{ textAlign: "right" }}><Icon name="chevR" size={16} style={{ color: "var(--ink-48)" }} /></div>
          </div>
        ))}
        {rows.length === 0 && <div style={{ padding: 50, textAlign: "center" }} className="t-cap">无匹配用户</div>}
      </div>

      <div className="t-cap" style={{ marginTop: 14, display: "flex", justifyContent: "space-between" }}>
        <span>显示 {rows.length} / 共 {fmt(store.stats.users)} 个管理员账号（演示数据为前 14 条）</span>
        <span>跨 project 去重统计</span>
      </div>

      <div style={{ marginTop: 22 }}>
        <ApiSource endpoints={[
          { m: "GET", p: "/api/global/user/list", d: "跨 project 用户列表（project / keyword / status / groupCode 过滤）" },
          { m: "PUT", p: "/api/global/user/{userid}/status", d: "全局启用 / 禁用账号" },
          { m: "POST", p: "/api/global/user/{userid}/project-grants", d: "新增项目授权（详情抽屉 → 授权页）" },
          { m: "DELETE", p: "/api/global/user/{userid}/project-grants/{project}", d: "撤销项目授权" },
          { m: "PUT", p: "/api/project-grant/{userid}/super", d: "切换超管标记（目标 project 上下文）" },
        ]} note="用户详情聚合了 user/list 返回的 projectCodes、groupNames、superProjects 字段，无需额外接口。" />
      </div>

      <Drawer open={!!sel} onClose={() => setSel(null)} width={470}>
        {sel && <UserDetail user={sel} ctx={ctx} onClose={() => setSel(null)} onAuthorize={(u) => { setSel(null); setIntent({ type: "grant", userid: u.userid }); go("authorization"); }} />}
      </Drawer>
    </div>
  );
}

window.UsersPage = UsersPage;
window.SuperConfirm = SuperConfirm;
window.ProjectChips = ProjectChips;

</script>

<script type="text/babel" data-presets="react">
/* ============================================================
   Project authorization — user-centric ↔ project-centric.
   APIs: POST /api/global/user/{userid}/project-grants,
         DELETE /api/global/user/{userid}/project-grants/{project},
         PUT /api/project-grant/{userid}/super, GET /api/global/user/list,
         GET /api/global/project/list
   ============================================================ */
const { useState: useSA, useEffect: useEffA } = React;

/* ---- per-project best-effort result report (matches doc shape) ---- */
function ResultReport({ results, onClose }) {
  const ok = results.filter(r => r.success && !r.skipped).length;
  const sk = results.filter(r => r.skipped).length;
  const fail = results.filter(r => !r.success).length;
  return (
    <div style={{ padding: 26 }}>
      <div style={{ width: 46, height: 46, borderRadius: 12, background: fail ? "var(--warn-wash)" : "var(--ok-wash)",
        color: fail ? "var(--warn)" : "var(--ok)", display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 16 }}>
        <Icon name="check" size={24} stroke={2.4} />
      </div>
      <div className="t-title" style={{ fontSize: 21, marginBottom: 6 }}>授权完成</div>
      <div className="t-body" style={{ color: "var(--ink-60)", marginBottom: 18 }}>
        逐 project 写入结果（best-effort 语义，单个失败不回滚其余）。成功 {ok} · 跳过 {sk} · 失败 {fail}。
      </div>
      <div style={{ border: "1px solid var(--hairline)", borderRadius: 12, overflow: "hidden", marginBottom: 20 }}>
        {results.map((r, i) => (
          <div key={r.project} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", borderTop: i ? "1px solid var(--divider)" : "none" }}>
            <ProjectGlyph code={r.project} name={r.name} size={30} />
            <div style={{ flex: 1 }}>
              <div className="t-body-strong" style={{ fontSize: 13.5 }}>{r.name}</div>
              <div className="t-cap"><span className="t-mono">{r.project}</span></div>
            </div>
            {r.skipped ? <Badge tone="neutral" size="sm">已存在 · skipped</Badge>
              : r.success ? <Badge tone="ok" dot size="sm">success</Badge>
              : <Badge tone="deny" dot size="sm">failed</Badge>}
          </div>
        ))}
      </div>
      <div style={{ display: "flex", justifyContent: "flex-end" }}>
        <button className="btn btn-primary" onClick={onClose}>完成</button>
      </div>
    </div>
  );
}

/* ---- user-centric grant workspace ---- */
function UserGrant({ ctx, user }) {
  const { store, actions } = ctx;
  const u = store.users.find(x => x.userid === user.userid) || user;
  const [picked, setPicked] = useSA([]);
  const [asSuper, setAsSuper] = useSA(false);
  const [report, setReport] = useSA(null);
  const [superConfirm, setSuperConfirm] = useSA(null);

  const available = store.projects.filter(p => !u.projectCodes.includes(p.code));
  const toggle = (code) => setPicked(p => p.includes(code) ? p.filter(c => c !== code) : [...p, code]);

  const doGrant = () => {
    const results = picked.map(pc => {
      const p = store.projects.find(x => x.code === pc);
      return { project: pc, name: p.name, success: true, skipped: false };
    });
    actions.grantProjects(u.userid, u.username, picked, asSuper);
    setReport(results); setPicked([]); setAsSuper(false);
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 22 }}>
      {/* current grants */}
      <div className="card" style={{ padding: 22 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 13, marginBottom: 18 }}>
          <Avatar name={u.username} size={46} dim={u.status === "Disabled"} />
          <div style={{ flex: 1 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
              <span className="t-title" style={{ fontSize: 21 }}>{u.username}</span>
              {u.status === "Disabled" && <Badge tone="neutral" size="sm">已禁用</Badge>}
              {u.isSuper && <Badge tone="super" dot size="sm">全局超管</Badge>}
            </div>
            <div className="t-cap" style={{ marginTop: 2 }}><span className="t-mono">{u.userid}</span> · 已授权 {u.projectCodes.length} 个系统</div>
          </div>
        </div>
        <div className="t-cap-strong" style={{ marginBottom: 10 }}>当前授权</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {u.projectCodes.length === 0 && <div className="t-cap" style={{ padding: "6px 0" }}>该用户暂无任何项目授权</div>}
          {u.projectCodes.map(pc => {
            const p = store.projects.find(x => x.code === pc);
            const isSup = u.superProjects.includes(pc);
            return (
              <div key={pc} style={{ display: "flex", alignItems: "center", gap: 12, padding: "11px 14px", border: "1px solid var(--hairline)", borderRadius: 12 }}>
                <ProjectGlyph code={pc} name={p.name} size={32} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div className="t-body-strong" style={{ fontSize: 14 }}>{p.name}</div>
                  <div className="t-cap"><span className="t-mono">{pc}</span></div>
                </div>
                {isSup && <Badge tone="super" dot size="sm">超管</Badge>}
                <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                  <span className="t-cap" style={{ color: isSup ? "var(--super)" : "var(--ink-48)" }}>超管</span>
                  <Toggle tone="super" on={isSup} onChange={(v) => setSuperConfirm({ pc, p, val: v })} />
                </div>
                <button className="btn" onClick={() => actions.revokeGrant(u.userid, pc)} title="撤销"
                  style={{ width: 30, height: 30, borderRadius: 8, color: "var(--deny)", background: "var(--deny-wash)" }}><Icon name="trash" size={15} /></button>
              </div>
            );
          })}
        </div>
      </div>

      {/* new grant */}
      <div className="card" style={{ padding: 22 }}>
        <div className="t-section" style={{ marginBottom: 4 }}>新增项目授权</div>
        <div className="t-cap" style={{ marginBottom: 16 }}>选择一个或多个系统，一次性提交 · POST /api/global/user/{"{userid}"}/project-grants</div>
        {available.length === 0 ? <div className="t-cap">已授权全部系统</div> : (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10, marginBottom: 18 }}>
            {available.map(p => {
              const on = picked.includes(p.code);
              return (
                <button key={p.code} className="btn" onClick={() => toggle(p.code)}
                  style={{ justifyContent: "flex-start", gap: 11, padding: "12px 14px", borderRadius: 12,
                    border: on ? "2px solid var(--blue)" : "1px solid var(--hairline)", background: on ? "var(--blue-wash)" : "#fff" }}>
                  <ProjectGlyph code={p.code} name={p.name} size={30} />
                  <div style={{ textAlign: "left", flex: 1, minWidth: 0 }}>
                    <div className="t-body-strong" style={{ fontSize: 13.5 }}>{p.name}</div>
                    <div className="t-cap" style={{ fontSize: 11.5 }}><span className="t-mono">{p.code}</span></div>
                  </div>
                  {on && <Icon name="check" size={16} stroke={2.6} style={{ color: "var(--blue)" }} />}
                </button>
              );
            })}
          </div>
        )}
        <div style={{ display: "flex", alignItems: "center", gap: 12, justifyContent: "space-between", flexWrap: "wrap" }}>
          <label style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }}>
            <Toggle tone="super" on={asSuper} onChange={setAsSuper} />
            <div>
              <div className="t-body-strong" style={{ fontSize: 13.5 }}>同时授予超管</div>
              <div className="t-cap">对所选系统赋予全部权限（isSuper = true）</div>
            </div>
          </label>
          <button className="btn btn-primary" disabled={picked.length === 0} onClick={doGrant}>
            <Icon name="key" size={15} /> 授权到 {picked.length || ""} 个系统
          </button>
        </div>
      </div>

      {report && <Modal open onClose={() => setReport(null)} width={460}><ResultReport results={report} onClose={() => setReport(null)} /></Modal>}
      {superConfirm && <Modal open onClose={() => setSuperConfirm(null)} width={440}>
        <SuperConfirm u={u} project={superConfirm.p} pc={superConfirm.pc} val={superConfirm.val}
          onCancel={() => setSuperConfirm(null)}
          onConfirm={() => { actions.setSuper(u.userid, superConfirm.pc, superConfirm.val); setSuperConfirm(null); }} />
      </Modal>}
    </div>
  );
}

/* ---- project-centric member workspace ---- */
function ProjectGrantPanel({ ctx, project }) {
  const { store, actions } = ctx;
  const members = store.users.filter(u => u.projectCodes.includes(project.code));
  const candidates = store.users.filter(u => !u.projectCodes.includes(project.code));
  const [adding, setAdding] = useSA(false);
  const [kw, setKw] = useSA("");
  const [superConfirm, setSuperConfirm] = useSA(null);
  const filtered = candidates.filter(u => u.username.includes(kw) || u.userid.toLowerCase().includes(kw.toLowerCase()));

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 22 }}>
      <div className="card" style={{ padding: 22 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 13 }}>
          <ProjectGlyph code={project.code} name={project.name} size={46} radius={12} />
          <div style={{ flex: 1 }}>
            <div className="t-title" style={{ fontSize: 21 }}>{project.name}</div>
            <div className="t-cap" style={{ marginTop: 2 }}>{project.cn} · <span className="t-mono">{project.code}</span> · {members.length} 位已授权用户</div>
          </div>
          <button className="btn btn-primary" onClick={() => setAdding(true)}><Icon name="plus" size={15} /> 添加用户</button>
        </div>
      </div>

      <div className="card" style={{ padding: 0, overflow: "hidden" }}>
        <div style={{ display: "grid", gridTemplateColumns: "2fr 2fr 1fr 90px", padding: "12px 22px", background: "var(--pearl)", borderBottom: "1px solid var(--hairline)" }}>
          {["用户", "权限组", "超管", ""].map((h,i) => <span key={i} className="t-cap-strong" style={{ fontSize: 12 }}>{h}</span>)}
        </div>
        {members.map((u, i) => {
          const isSup = u.superProjects.includes(project.code);
          const grant = u.grants[project.code] || {};
          const gnames = (grant.groups || []).map(gc => (store.groups.find(g => g.groupCode === gc) || {}).groupName || gc);
          return (
            <div key={u.userid} style={{ display: "grid", gridTemplateColumns: "2fr 2fr 1fr 90px", padding: "13px 22px", alignItems: "center", borderTop: i ? "1px solid var(--divider)" : "none" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 11 }}>
                <Avatar name={u.username} size={32} dim={u.status === "Disabled"} />
                <div><div className="t-body-strong" style={{ fontSize: 14 }}>{u.username}</div><div className="t-cap"><span className="t-mono" style={{ fontSize: 11.5 }}>{u.userid}</span></div></div>
              </div>
              <div className="t-body" style={{ fontSize: 13 }}>{gnames.length ? gnames.join("、") : <span className="muted">—</span>}</div>
              <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                <Toggle tone="super" on={isSup} onChange={(v) => setSuperConfirm({ u, val: v })} />
              </div>
              <div style={{ textAlign: "right" }}>
                <button className="btn" onClick={() => actions.revokeGrant(u.userid, project.code)} title="撤销授权"
                  style={{ width: 30, height: 30, borderRadius: 8, color: "var(--deny)", background: "var(--deny-wash)" }}><Icon name="trash" size={15} /></button>
              </div>
            </div>
          );
        })}
        {members.length === 0 && <div style={{ padding: 40, textAlign: "center" }} className="t-cap">暂无授权用户</div>}
      </div>

      <Drawer open={adding} onClose={() => setAdding(false)} width={420}>
        <div style={{ padding: "22px 24px 16px", borderBottom: "1px solid var(--divider)" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <span className="t-section">添加用户到 {project.name}</span>
            <button className="btn" onClick={() => setAdding(false)} style={{ width: 30, height: 30, borderRadius: 8, background: "var(--parchment)" }}><Icon name="x" size={16} /></button>
          </div>
          <SearchInput value={kw} onChange={setKw} placeholder="搜索用户" width="100%" />
        </div>
        <div style={{ flex: 1, overflowY: "auto", padding: "8px 16px" }}>
          {filtered.map(u => (
            <div key={u.userid} style={{ display: "flex", alignItems: "center", gap: 11, padding: "10px 8px", borderBottom: "1px solid var(--divider)" }}>
              <Avatar name={u.username} size={32} />
              <div style={{ flex: 1 }}><div className="t-body-strong" style={{ fontSize: 13.5 }}>{u.username}</div><div className="t-cap"><span className="t-mono" style={{ fontSize: 11 }}>{u.userid}</span></div></div>
              <button className="btn btn-ghost btn-sm" onClick={() => { actions.grantProjects(u.userid, u.username, [project.code], false); ctx.toast.push(`已授权 ${u.username}`); }}>授权</button>
            </div>
          ))}
          {filtered.length === 0 && <div style={{ padding: 30, textAlign: "center" }} className="t-cap">无匹配用户</div>}
        </div>
      </Drawer>

      {superConfirm && <Modal open onClose={() => setSuperConfirm(null)} width={440}>
        <SuperConfirm u={superConfirm.u} project={project} pc={project.code} val={superConfirm.val}
          onCancel={() => setSuperConfirm(null)}
          onConfirm={() => { actions.setSuper(superConfirm.u.userid, project.code, superConfirm.val); setSuperConfirm(null); }} />
      </Modal>}
    </div>
  );
}

function AuthorizationPage({ ctx, setAction }) {
  const { store, intent } = ctx;
  const [mode, setMode] = useSA(intent && intent.project ? "project" : "user");
  const [userId, setUserId] = useSA((intent && intent.userid) || store.users[0].userid);
  const [projCode, setProjCode] = useSA((intent && intent.project) || store.projects[0].code);
  const [kw, setKw] = useSA("");

  useEffA(() => {
    setAction(<Segmented value={mode} onChange={setMode} options={[{value:"user",label:"按用户授权"},{value:"project",label:"按系统授权"}]} />);
    return () => setAction(null);
  }, [mode]);

  const user = store.users.find(u => u.userid === userId) || store.users[0];
  const project = store.projects.find(p => p.code === projCode) || store.projects[0];
  const userList = store.users.filter(u => u.username.includes(kw) || u.userid.toLowerCase().includes(kw.toLowerCase()));

  return (
    <div style={{ display: "grid", gridTemplateColumns: "280px 1fr", gap: 20, alignItems: "start" }}>
      {/* selector rail */}
      <div className="card" style={{ padding: 0, overflow: "hidden", position: "sticky", top: 20 }}>
        <div style={{ padding: 14, borderBottom: "1px solid var(--divider)" }}>
          {mode === "user"
            ? <SearchInput value={kw} onChange={setKw} placeholder="搜索用户" width="100%" />
            : <div className="t-cap-strong" style={{ padding: "4px 2px" }}>选择系统</div>}
        </div>
        <div style={{ maxHeight: "calc(100vh - 200px)", overflowY: "auto" }}>
          {mode === "user" ? userList.map(u => {
            const on = u.userid === userId;
            return (
              <button key={u.userid} className="btn" onClick={() => setUserId(u.userid)}
                style={{ width: "100%", justifyContent: "flex-start", gap: 11, padding: "11px 14px", borderRadius: 0,
                  background: on ? "var(--blue-wash)" : "transparent", borderBottom: "1px solid var(--divider)" }}>
                <Avatar name={u.username} size={30} dim={u.status === "Disabled"} />
                <div style={{ textAlign: "left", flex: 1, minWidth: 0 }}>
                  <div className="t-body-strong" style={{ fontSize: 13.5, color: on ? "var(--blue)" : "var(--ink)" }}>{u.username}</div>
                  <div className="t-cap" style={{ fontSize: 11.5 }}>{u.projectCodes.length} 系统 · {u.superProjects.length} 超管</div>
                </div>
              </button>
            );
          }) : store.projects.map(p => {
            const on = p.code === projCode;
            return (
              <button key={p.code} className="btn" onClick={() => setProjCode(p.code)}
                style={{ width: "100%", justifyContent: "flex-start", gap: 11, padding: "12px 14px", borderRadius: 0,
                  background: on ? "var(--blue-wash)" : "transparent", borderBottom: "1px solid var(--divider)" }}>
                <ProjectGlyph code={p.code} name={p.name} size={32} />
                <div style={{ textAlign: "left", flex: 1, minWidth: 0 }}>
                  <div className="t-body-strong" style={{ fontSize: 13.5, color: on ? "var(--blue)" : "var(--ink)" }}>{p.name}</div>
                  <div className="t-cap" style={{ fontSize: 11.5 }}>{p.users} 用户 · {p.supers} 超管</div>
                </div>
              </button>
            );
          })}
        </div>
      </div>

      <div>
        {mode === "user" ? <UserGrant ctx={ctx} user={user} /> : <ProjectGrantPanel ctx={ctx} project={project} />}
        <div style={{ marginTop: 22 }}>
          <ApiSource endpoints={[
            { m: "POST", p: "/api/global/user/{userid}/project-grants", d: "授权到多个 project（body 含 targetProjects、isSuper、username）" },
            { m: "DELETE", p: "/api/global/user/{userid}/project-grants/{project}", d: "撤销单个 project 授权（幂等）" },
            { m: "PUT", p: "/api/project-grant/{userid}/super", d: "切换已有授权的超管标记" },
            { m: "GET", p: "/api/global/user/list", d: "按系统筛选已授权用户" },
            { m: "GET", p: "/api/global/project/list", d: "可选目标系统" },
          ]} note="按用户与按系统两种视图共用同一组写接口，仅入口与聚合方向不同。超管切换需进入目标 project 上下文（建议未来提供全局超管切换接口）。" />
        </div>
      </div>
    </div>
  );
}

window.AuthorizationPage = AuthorizationPage;
window.ResultReport = ResultReport;

</script>

<script type="text/babel" data-presets="react">
/* ============================================================
   Permission group management.
   APIs: GET /api/global/group/list, GET /api/group/list,
         POST /api/group, PUT /api/group/{groupCode}/status,
         POST /api/global/group/{groupCode}/members,
         DELETE /api/global/group/{groupCode}/members/{userid}?targetProject=
         GET /api/rule/tree, GET /api/api-map/list
   ============================================================ */
const { useState: useSG, useEffect: useEffG } = React;

function GroupDetail({ group, ctx, onClose }) {
  const { store, actions } = ctx;
  const g = store.groups.find(x => x.groupCode === group.groupCode) || group;
  const p = store.projects.find(x => x.code === g.project);
  const members = store.users.filter(u => u.groupCodes.includes(g.groupCode));
  const [adding, setAdding] = useSG(false);
  const [kw, setKw] = useSG("");
  const candidates = store.users.filter(u => !u.groupCodes.includes(g.groupCode) && (u.username.includes(kw) || u.userid.toLowerCase().includes(kw.toLowerCase())));

  return (
    <React.Fragment>
      <div style={{ padding: "22px 24px 18px", borderBottom: "1px solid var(--divider)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <span className="t-cap-strong">权限组详情</span>
          <button className="btn" onClick={onClose} style={{ width: 32, height: 32, borderRadius: 8, background: "var(--parchment)" }}><Icon name="x" size={17} /></button>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 13 }}>
          <span style={{ width: 48, height: 48, borderRadius: 13, background: "var(--blue-wash)", color: "var(--blue)", display: "flex", alignItems: "center", justifyContent: "center" }}><Icon name="shield" size={24} /></span>
          <div style={{ flex: 1 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
              <span className="t-title" style={{ fontSize: 21 }}>{g.groupName}</span>
              <Badge tone={g.status === "Active" ? "ok" : "neutral"} dot size="sm">{g.status === "Active" ? "启用" : "禁用"}</Badge>
            </div>
            <div className="t-cap" style={{ marginTop: 2 }}><span className="t-mono">{g.groupCode}</span></div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 10, marginTop: 16 }}>
          <div style={{ flex: 1, padding: "10px 12px", background: "var(--parchment)", borderRadius: 10, display: "flex", alignItems: "center", gap: 9 }}>
            <ProjectGlyph code={g.project} name={p ? p.name : g.project} size={26} />
            <div><div className="t-cap" style={{ fontSize: 11 }}>所属系统</div><div className="t-body-strong" style={{ fontSize: 13 }}>{p ? p.name : g.project}</div></div>
          </div>
          <div style={{ flex: 1, padding: "10px 12px", background: "var(--parchment)", borderRadius: 10 }}>
            <div className="t-cap" style={{ fontSize: 11 }}>父权限组</div>
            <div className="t-body-strong" style={{ fontSize: 13 }}>{g.parent_group_code || "根组"}</div>
          </div>
        </div>
      </div>

      <div style={{ flex: 1, overflowY: "auto", padding: "20px 24px" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px", background: "var(--parchment)", borderRadius: 12, marginBottom: 22 }}>
          <div><div className="t-body-strong" style={{ fontSize: 14 }}>启用状态</div><div className="t-cap">PUT /api/group/{"{groupCode}"}/status</div></div>
          <Toggle on={g.status === "Active"} onChange={(v) => actions.setGroupStatus(g.groupCode, v ? "Active" : "Disabled")} />
        </div>

        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
          <span className="t-section">成员（{members.length}）</span>
          <button className="btn btn-text" onClick={() => setAdding(a => !a)}><Icon name="plus" size={14} /> 添加成员</button>
        </div>
        {adding && (
          <div className="anim-fade" style={{ border: "1px solid var(--hairline)", borderRadius: 12, padding: 12, marginBottom: 14 }}>
            <SearchInput value={kw} onChange={setKw} placeholder={`搜索用户加入 ${g.project}`} width="100%" />
            <div style={{ maxHeight: 200, overflowY: "auto", marginTop: 10 }}>
              {candidates.slice(0, 8).map(u => (
                <div key={u.userid} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 4px", borderTop: "1px solid var(--divider)" }}>
                  <Avatar name={u.username} size={28} />
                  <div style={{ flex: 1 }}><span className="t-body-strong" style={{ fontSize: 13 }}>{u.username}</span> <span className="t-cap"><span className="t-mono" style={{ fontSize: 11 }}>{u.userid}</span></span></div>
                  <button className="btn btn-ghost btn-sm" onClick={() => actions.addMember(g.groupCode, u.userid, g.project, u.username)}>加入</button>
                </div>
              ))}
              {candidates.length === 0 && <div className="t-cap" style={{ padding: 10, textAlign: "center" }}>无可添加用户</div>}
            </div>
          </div>
        )}
        <div style={{ display: "flex", flexDirection: "column", gap: 7, marginBottom: 24 }}>
          {members.map(u => (
            <div key={u.userid} style={{ display: "flex", alignItems: "center", gap: 11, padding: "9px 12px", border: "1px solid var(--hairline)", borderRadius: 11 }}>
              <Avatar name={u.username} size={30} dim={u.status === "Disabled"} />
              <div style={{ flex: 1 }}><div className="t-body-strong" style={{ fontSize: 13.5 }}>{u.username}</div><div className="t-cap"><span className="t-mono" style={{ fontSize: 11 }}>{u.userid}</span></div></div>
              <button className="btn" onClick={() => actions.removeMember(g.groupCode, u.userid)} title="移除"
                style={{ width: 28, height: 28, borderRadius: 8, color: "var(--deny)", background: "var(--deny-wash)" }}><Icon name="x" size={15} /></button>
            </div>
          ))}
          {members.length === 0 && <div className="t-cap" style={{ padding: "6px 0" }}>暂无成员</div>}
        </div>

        <div className="t-section" style={{ marginBottom: 4 }}>授权权限码（{g.permissionCodes.length}）</div>
        <div className="t-cap" style={{ marginBottom: 12 }}>permissionCodes = ruleCodes 推导值 ∪ extraPermissionCodes</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
          {g.permissionCodes.map(pc => (
            <span key={pc} className="t-mono" style={{ fontSize: 11.5, padding: "5px 10px", background: pc.startsWith("menu:") ? "#eef4fb" : "#f3eefb",
              color: pc.startsWith("menu:") ? "var(--blue)" : "var(--super)", borderRadius: 7 }}>{pc}</span>
          ))}
        </div>
      </div>
    </React.Fragment>
  );
}

function CreateGroupModal({ ctx, onClose }) {
  const { store, actions } = ctx;
  const [name, setName] = useSG("");
  const [code, setCode] = useSG("");
  const [project, setProject] = useSG(store.projects[0].code);
  const [parent, setParent] = useSG("");
  const [ruleCodes, setRuleCodes] = useSG([]);
  const [extra, setExtra] = useSG([]);

  const flatten = (nodes, out = []) => { (nodes||[]).forEach(n => { out.push(n); if (n.children) flatten(n.children, out); }); return out; };
  const rules = flatten(store.ruleTree[project] || []);
  const projGroups = store.groups.filter(g => g.project === project);
  const toggleRule = (rc) => setRuleCodes(s => s.includes(rc) ? s.filter(x => x !== rc) : [...s, rc]);
  const toggleExtra = (pc) => setExtra(s => s.includes(pc) ? s.filter(x => x !== pc) : [...s, pc]);

  const derived = Array.from(new Set([
    ...rules.filter(r => ruleCodes.includes(r.ruleCode)).map(r => r.permissionCode),
    ...extra,
  ]));

  const submit = () => {
    actions.createGroup({
      groupCode: code || ("group_" + Math.random().toString(36).slice(2, 8)),
      groupName: name || "未命名组", project, parent_group_code: parent || null, status: "Active",
      permissionCodes: derived,
    });
    onClose();
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", maxHeight: "86vh" }}>
      <div style={{ padding: "22px 26px 16px", borderBottom: "1px solid var(--divider)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div><div className="t-title" style={{ fontSize: 21 }}>新建权限组</div><div className="t-cap" style={{ marginTop: 2 }}>POST /api/group</div></div>
        <button className="btn" onClick={onClose} style={{ width: 32, height: 32, borderRadius: 8, background: "var(--parchment)" }}><Icon name="x" size={17} /></button>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: 26, display: "flex", flexDirection: "column", gap: 18 }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
          <Field label="组名称" value={name} onChange={setName} placeholder="例如 门户管理员" />
          <Field label="组编码 groupCode" value={code} onChange={setCode} placeholder="留空自动生成 group_<guid>" mono />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
          <Field label="所属系统 project" as="select" value={project} onChange={(v) => { setProject(v); setRuleCodes([]); setParent(""); }}>
            {store.projects.map(p => <option key={p.code} value={p.code}>{p.name}</option>)}
          </Field>
          <Field label="父权限组" as="select" value={parent} onChange={setParent}>
            <option value="">根组（无父级）</option>
            {projGroups.map(g => <option key={g.groupCode} value={g.groupCode}>{g.groupName}</option>)}
          </Field>
        </div>
        <div>
          <div className="t-cap-strong" style={{ marginBottom: 8 }}>规则授权 ruleCodes · GET /api/rule/tree</div>
          <div style={{ border: "1px solid var(--hairline)", borderRadius: 12, maxHeight: 200, overflowY: "auto", padding: 6 }}>
            {rules.map(r => (
              <label key={r.ruleCode} style={{ display: "flex", alignItems: "center", gap: 10, padding: "7px 8px", cursor: "pointer", borderRadius: 8 }}>
                <Check on={ruleCodes.includes(r.ruleCode)} onChange={() => toggleRule(r.ruleCode)} />
                <span style={{ paddingLeft: r.type === "Button" ? 16 : 0, display: "flex", alignItems: "center", gap: 7, flex: 1 }}>
                  <Badge tone={r.type === "Button" ? "neutral" : r.type === "MenuDir" ? "blue" : "ok"} size="sm">{r.type}</Badge>
                  <span className="t-body" style={{ fontSize: 13 }}>{r.title}</span>
                  <span className="t-mono muted" style={{ fontSize: 11, marginLeft: "auto" }}>{r.permissionCode}</span>
                </span>
              </label>
            ))}
          </div>
        </div>
        <div>
          <div className="t-cap-strong" style={{ marginBottom: 8 }}>追加端点权限 extraPermissionCodes · GET /api/api-map/list</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
            {store.permView.map(pv => {
              const on = extra.includes(pv.permissionCode);
              return (
                <button key={pv.permissionCode} className="btn" onClick={() => toggleExtra(pv.permissionCode)}
                  style={{ padding: "6px 11px", borderRadius: 9999, fontSize: 12,
                    border: on ? "1.5px solid var(--blue)" : "1px solid var(--hairline)", background: on ? "var(--blue-wash)" : "#fff", color: on ? "var(--blue)" : "var(--ink-80)" }}>
                  <span className="t-mono" style={{ fontSize: 11.5 }}>{pv.permissionCode}</span>
                </button>
              );
            })}
          </div>
        </div>
        <div style={{ background: "var(--parchment)", borderRadius: 12, padding: 14 }}>
          <div className="t-cap-strong" style={{ marginBottom: 8 }}>最终授权权限码（{derived.length}）</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {derived.length === 0 ? <span className="t-cap">尚未选择任何规则或端点权限</span> : derived.map(d => <span key={d} className="t-mono" style={{ fontSize: 11, padding: "3px 8px", background: "#fff", borderRadius: 6 }}>{d}</span>)}
          </div>
        </div>
      </div>
      <div style={{ padding: "16px 26px", borderTop: "1px solid var(--divider)", display: "flex", justifyContent: "flex-end", gap: 10 }}>
        <button className="btn btn-neutral" onClick={onClose}>取消</button>
        <button className="btn btn-primary" onClick={submit}>创建权限组</button>
      </div>
    </div>
  );
}

function GroupsPage({ ctx, setAction }) {
  const { store, intent } = ctx;
  const [kw, setKw] = useSG("");
  const [proj, setProj] = useSG(intent && intent.project ? intent.project : "all");
  const [sel, setSel] = useSG(null);
  const [creating, setCreating] = useSG(false);

  useEffG(() => {
    setAction(<button className="btn btn-primary" onClick={() => setCreating(true)}><Icon name="plus" size={16} /> 新建权限组</button>);
    return () => setAction(null);
  }, []);

  const rows = store.groups.filter(g => {
    if (proj !== "all" && g.project !== proj) return false;
    if (kw && !(g.groupName.includes(kw) || g.groupCode.toLowerCase().includes(kw.toLowerCase()))) return false;
    return true;
  });

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 18, flexWrap: "wrap" }}>
        <SearchInput value={kw} onChange={setKw} placeholder="搜索组名或编码" width={240} />
        <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 8 }}>
          <Icon name="filter" size={15} style={{ color: "var(--ink-48)" }} />
          <select value={proj} onChange={e => setProj(e.target.value)} style={{ height: 34, borderRadius: 9999, border: "1px solid var(--hairline)", background: "#fff", padding: "0 14px", fontSize: 13.5 }}>
            <option value="all">全部系统</option>
            {store.projects.map(p => <option key={p.code} value={p.code}>{p.name}</option>)}
          </select>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 14 }}>
        {rows.map(g => {
          const p = store.projects.find(x => x.code === g.project);
          return (
            <button key={g.groupCode} className="btn" onClick={() => setSel(g)}
              style={{ textAlign: "left", flexDirection: "column", alignItems: "stretch", gap: 14, padding: 20, borderRadius: 18, border: "1px solid var(--hairline)", background: "#fff" }}
              onMouseEnter={e => e.currentTarget.style.borderColor = "#cdcdd2"} onMouseLeave={e => e.currentTarget.style.borderColor = "var(--hairline)"}>
              <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between" }}>
                <span style={{ width: 38, height: 38, borderRadius: 11, background: "var(--blue-wash)", color: "var(--blue)", display: "flex", alignItems: "center", justifyContent: "center" }}><Icon name="shield" size={20} /></span>
                <Badge tone={g.status === "Active" ? "ok" : "neutral"} dot size="sm">{g.status === "Active" ? "启用" : "禁用"}</Badge>
              </div>
              <div>
                <div className="t-body-strong" style={{ fontSize: 15.5 }}>{g.groupName}</div>
                <div className="t-cap" style={{ marginTop: 2 }}><span className="t-mono" style={{ fontSize: 11.5 }}>{g.groupCode}</span></div>
              </div>
              <hr className="hr" style={{ background: "var(--divider)" }} />
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}><ProjectGlyph code={g.project} name={p ? p.name : g.project} size={20} radius={5} /><span className="t-cap" style={{ fontWeight: 500 }}>{p ? p.name.replace(" Center","") : g.project}</span></span>
                <span className="t-cap"><b style={{ color: "var(--ink)" }}>{g.members}</b> 成员 · <b style={{ color: "var(--ink)" }}>{g.permissionCodes.length}</b> 权限码</span>
              </div>
            </button>
          );
        })}
      </div>
      {rows.length === 0 && <div className="card" style={{ padding: 50, textAlign: "center" }}><span className="t-cap">无匹配权限组</span></div>}

      <div className="t-cap" style={{ marginTop: 14 }}>显示 {rows.length} 个权限组 · 全局合计 {store.stats.groups} 个</div>

      <div style={{ marginTop: 22 }}>
        <ApiSource endpoints={[
          { m: "GET", p: "/api/global/group/list", d: "跨 project 权限组列表" },
          { m: "POST", p: "/api/group", d: "新建权限组（ruleCodes + extraPermissionCodes）" },
          { m: "PUT", p: "/api/group/{groupCode}/status", d: "启用 / 禁用" },
          { m: "POST", p: "/api/global/group/{groupCode}/members", d: "加入成员（body 含 targetProject）" },
          { m: "DELETE", p: "/api/global/group/{groupCode}/members/{userid}", d: "移除成员（query targetProject）" },
          { m: "GET", p: "/api/rule/tree", d: "规则授权选择器" },
        ]} note="组层级仅用于展示，实际访问由 permissionCodes 决定。组的新建/编辑为 per-project 接口；跨 project 组模板为建议的未来扩展。" />
      </div>

      <Drawer open={!!sel} onClose={() => setSel(null)} width={470}>{sel && <GroupDetail group={sel} ctx={ctx} onClose={() => setSel(null)} />}</Drawer>
      <Modal open={creating} onClose={() => setCreating(false)} width={620}>{creating && <CreateGroupModal ctx={ctx} onClose={() => setCreating(false)} />}</Modal>
    </div>
  );
}

window.GroupsPage = GroupsPage;

</script>

<script type="text/babel" data-presets="react">
/* ============================================================
   Menu & route management — rule tree + API permission map.
   APIs: GET /api/global/menu/list, GET /api/rule/tree, GET /api/rule/list,
         PUT /api/rule/{ruleCode}/status, PUT /api/rule/{ruleCode}/weigh,
         GET /api/api-map/records, POST/PUT/DELETE /api/api-map
   ============================================================ */
const { useState: useSM, useEffect: useEffM } = React;

const TYPE_META = {
  MenuDir: { tone: "blue", label: "目录", icon: "folder" },
  Menu:    { tone: "ok", label: "菜单", icon: "menu" },
  Button:  { tone: "neutral", label: "按钮", icon: "spark" },
};

function RuleRow({ node, depth, ctx, project }) {
  const { actions } = ctx;
  const [open, setOpen] = useSM(true);
  const meta = TYPE_META[node.type] || TYPE_META.Menu;
  const hasChildren = node.children && node.children.length > 0;
  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 11, padding: "11px 16px", paddingLeft: 16 + depth * 26,
        borderTop: "1px solid var(--divider)", background: node.status === "Disabled" ? "var(--pearl)" : "transparent" }}>
        <button className="btn" onClick={() => hasChildren && setOpen(o => !o)} style={{ width: 18, height: 18, padding: 0, opacity: hasChildren ? 1 : 0 }}>
          <Icon name="chevR" size={14} style={{ color: "var(--ink-48)", transform: open ? "rotate(90deg)" : "none", transition: "transform .15s" }} />
        </button>
        <span style={{ width: 30, height: 30, borderRadius: 8, background: meta.tone === "blue" ? "var(--blue-wash)" : meta.tone === "ok" ? "var(--ok-wash)" : "#f0f0f2",
          color: meta.tone === "blue" ? "var(--blue)" : meta.tone === "ok" ? "var(--ok)" : "var(--ink-60)", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <Icon name={meta.icon} size={16} /></span>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span className="t-body-strong" style={{ fontSize: 14, color: node.status === "Disabled" ? "var(--ink-48)" : "var(--ink)" }}>{node.title}</span>
            <Badge tone={meta.tone} size="sm">{meta.label}</Badge>
          </div>
          <div className="t-cap" style={{ marginTop: 1, display: "flex", gap: 10 }}>
            <span className="t-mono" style={{ fontSize: 11.5 }}>{node.ruleCode}</span>
            {node.path && <span className="t-mono muted" style={{ fontSize: 11.5 }}>{node.path}</span>}
          </div>
        </div>
        <span className="t-mono" style={{ fontSize: 11, color: node.permissionCode.startsWith("menu:") ? "var(--blue)" : "var(--super)" }}>{node.permissionCode}</span>
        <span className="t-cap" style={{ width: 56, textAlign: "right" }}>权重 {node.weigh}</span>
        <Toggle on={node.status === "Active"} onChange={(v) => actions.setRuleStatus(project, node.ruleCode, v ? "Active" : "Disabled")} />
      </div>
      {hasChildren && open && node.children.map(c => <RuleRow key={c.ruleCode} node={c} depth={depth + 1} ctx={ctx} project={project} />)}
    </div>
  );
}

function ApiMapEditor({ rec, onSave, onClose }) {
  const [method, setMethod] = useSM(rec ? rec.httpMethod : "GET");
  const [route, setRoute] = useSM(rec ? rec.routePattern : "");
  const [perm, setPerm] = useSM(rec ? rec.permissionCode : "");
  const [action, setAction] = useSM(rec ? rec.action : "read");
  const editing = !!rec;
  return (
    <div style={{ padding: 26 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <div><div className="t-title" style={{ fontSize: 20 }}>{editing ? "编辑 API 映射" : "新增 API 映射"}</div>
          <div className="t-cap" style={{ marginTop: 2 }}>{editing ? "PUT /api/api-map/{id} · 仅更新权限码与动作" : "POST /api/api-map"}</div></div>
        <button className="btn" onClick={onClose} style={{ width: 32, height: 32, borderRadius: 8, background: "var(--parchment)" }}><Icon name="x" size={17} /></button>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
        <div style={{ display: "grid", gridTemplateColumns: "120px 1fr", gap: 12 }}>
          <Field label="方法" as="select" value={method} onChange={setMethod}>
            {["GET","POST","PUT","DELETE","PATCH"].map(m => <option key={m} value={m} disabled={editing}>{m}</option>)}
          </Field>

<script type="text/babel" data-presets="react">
/* ============================================================
   Audit & activity — runtime authZ decisions + permission view.
   APIs: GET /api/search/audit-logs, GET /api/search/permission-view
   ============================================================ */
const { useState: useSAu, useEffect: useEffAu } = React;

function AuditPage({ ctx }) {
  const { store, intent } = ctx;
  const [tab, setTab] = useSAu("logs");
  const [result, setResult] = useSAu("all");
  const [method, setMethod] = useSAu("all");
  const [kw, setKw] = useSAu("");

  const rows = store.audit.filter(a => {
    if (result !== "all" && a.result !== result) return false;
    if (method !== "all" && a.httpMethod !== method) return false;
    if (kw && !(a.username.includes(kw) || a.userid.toLowerCase().includes(kw.toLowerCase()) || a.permissionCode.toLowerCase().includes(kw.toLowerCase()))) return false;
    return true;
  });
  const counts = {
    Allow: store.audit.filter(a => a.result === "Allow").length,
    Deny: store.audit.filter(a => a.result === "Deny").length,
    Error: store.audit.filter(a => a.result === "Error").length,
  };

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 18 }}>
        <Segmented value={tab} onChange={setTab} options={[{value:"logs",label:"鉴权日志"},{value:"perm",label:"权限视图"}]} />
        <div style={{ marginLeft: "auto" }} className="t-cap">只读查询 · 不产生写操作与 Outbox 事件</div>
      </div>

      {tab === "logs" ? (
        <React.Fragment>
          {/* honest scope callout */}
          <div style={{ display: "flex", gap: 11, alignItems: "flex-start", padding: "13px 16px", background: "var(--warn-wash)", border: "1px solid #ecdcb0", borderRadius: 12, marginBottom: 18 }}>

            <div className="t-cap" style={{ color: "#7a5500", lineHeight: 1.5 }}>
              本页记录的是<b>运行时鉴权结果</b>（Allow / Deny / Error），来自 GET /api/search/audit-logs。
              它<b>不是</b>授权变更历史（谁授予 / 撤销了什么）—— 写操作审计追踪为建议的未来 API 扩展。
            </div>
          </div>

          <div style={{ display: "flex", gap: 14, marginBottom: 18 }}>
            {[["通过","Allow","ok",counts.Allow],["拒绝","Deny","deny",counts.Deny],["异常","Error","warn",counts.Error]].map(([label,key,tone,val]) => (
              <button key={key} className="btn card" onClick={() => setResult(result === key ? "all" : key)}
                style={{ flex: 1, padding: "16px 20px", flexDirection: "column", alignItems: "flex-start", gap: 8,
                  borderColor: result === key ? `var(--${tone})` : "var(--hairline)", borderWidth: result === key ? 2 : 1 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, width: "100%" }}>
                  <Badge tone={tone} dot size="sm">{label}</Badge>
                  <Icon name="filter" size={13} style={{ marginLeft: "auto", color: result === key ? `var(--${tone})` : "var(--ink-48)" }} />
                </div>
                <div className="t-display" style={{ fontSize: 30 }}>{val}</div>
              </button>
            ))}
          </div>

          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14, flexWrap: "wrap" }}>
            <SearchInput value={kw} onChange={setKw} placeholder="搜索用户或权限码" width={240} />
            <Segmented size="sm" value={result} onChange={setResult} options={[{value:"all",label:"全部"},{value:"Allow",label:"通过"},{value:"Deny",label:"拒绝"},{value:"Error",label:"异常"}]} />
            <select value={method} onChange={e => setMethod(e.target.value)} style={{ height: 34, borderRadius: 9999, border: "1px solid var(--hairline)", background: "#fff", padding: "0 14px", fontSize: 13.5 }}>
              <option value="all">全部方法</option>
              {["GET","POST","PUT","DELETE"].map(m => <option key={m} value={m}>{m}</option>)}
            </select>
            <button className="btn btn-neutral btn-sm" style={{ marginLeft: "auto" }}><Icon name="dl" size={15} /> 导出</button>
          </div>

          <div className="card" style={{ padding: 0, overflow: "hidden" }}>
            <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1.6fr 2fr 1.6fr 0.9fr", padding: "12px 22px", background: "var(--pearl)", borderBottom: "1px solid var(--hairline)" }}>
              {["时间","用户","请求","权限码","结果"].map((h,i)=><span key={i} className="t-cap-strong" style={{ fontSize: 12 }}>{h}</span>)}
            </div>
            {rows.map((a, i) => {
              const tone = a.result === "Allow" ? "ok" : a.result === "Deny" ? "deny" : "warn";
              const label = a.result === "Allow" ? "通过" : a.result === "Deny" ? "拒绝" : "异常";
              return (
                <div key={a.auditId} style={{ display: "grid", gridTemplateColumns: "1.4fr 1.6fr 2fr 1.6fr 0.9fr", padding: "12px 22px", alignItems: "center", borderTop: i ? "1px solid var(--divider)" : "none" }}>
                  <div><div className="t-body" style={{ fontSize: 13 }}>{fmtTime(a.createdAt)}</div><div className="t-cap" style={{ fontSize: 11 }}>{timeAgo(a.createdAt)}</div></div>
                  <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
                    <Avatar name={a.username} size={28} />
                    <div><div className="t-body-strong" style={{ fontSize: 13 }}>{a.username}</div><div className="t-cap"><span className="t-mono" style={{ fontSize: 11 }}>{a.userid}</span> · {store.helpers.pname(a.project).replace(" Center","")}</div></div>
                  </div>
                  <div><span style={{ fontFamily: "SF Mono, ui-monospace, monospace", fontSize: 11, fontWeight: 700, color: METHOD_TONE[a.httpMethod] }}>{a.httpMethod}</span> <span className="t-mono" style={{ fontSize: 12 }}>{a.route}</span></div>
                  <div className="t-mono" style={{ fontSize: 12, color: a.permissionCode.startsWith("menu:") ? "var(--blue)" : a.permissionCode.startsWith("button:") ? "var(--super)" : "var(--ink-80)" }}>{a.permissionCode}</div>
                  <div><Badge tone={tone} dot size="sm">{label}</Badge></div>
                </div>
              );
            })}
            {rows.length === 0 && <div style={{ padding: 40, textAlign: "center" }} className="t-cap">无匹配日志</div>}
          </div>
          <div className="t-cap" style={{ marginTop: 12 }}>显示 {rows.length} 条 · 支持 userid / permissionCode / result / httpMethod / 时间范围过滤</div>

          <div style={{ marginTop: 22 }}>
            <ApiSource endpoints={[
              { m: "GET", p: "/api/search/audit-logs", d: "鉴权审计日志（userid / permissionCode / result / httpMethod / createdAtFrom~To）" },
            ]} note="返回字段：auditId、userid、project、permissionCode、result、reason、createdAt。" />
          </div>
        </React.Fragment>
      ) : (
        <React.Fragment>
          <div className="t-cap" style={{ marginBottom: 14 }}>API 到权限码的权限视图 · GET /api/search/permission-view</div>
          <div className="card" style={{ padding: 0, overflow: "hidden" }}>
            <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 2fr", padding: "12px 22px", background: "var(--pearl)", borderBottom: "1px solid var(--hairline)" }}>
              {["权限码","动作","资源类型","标题"].map((h,i)=><span key={i} className="t-cap-strong" style={{ fontSize: 12 }}>{h}</span>)}
            </div>
            {store.permView.map((pv, i) => (
              <div key={pv.permissionCode} style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 2fr", padding: "13px 22px", alignItems: "center", borderTop: i ? "1px solid var(--divider)" : "none" }}>
                <span className="t-mono" style={{ fontSize: 12.5, color: pv.permissionCode.startsWith("menu:") ? "var(--blue)" : pv.permissionCode.startsWith("button:") ? "var(--super)" : "var(--ink-80)" }}>{pv.permissionCode}</span>
                <span><Badge tone="neutral" size="sm">{pv.action}</Badge></span>
                <span className="t-body" style={{ fontSize: 13 }}>{pv.resourceType}</span>
                <span className="t-body" style={{ fontSize: 13 }}>{pv.title}</span>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 22 }}>
            <ApiSource endpoints={[
              { m: "GET", p: "/api/search/permission-view", d: "权限视图（permissionCode / action / resourceType / keyword）" },
            ]} />
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

window.AuditPage = AuditPage;

</script>
